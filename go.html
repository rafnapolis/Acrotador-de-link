<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirigiendo...</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f2f5; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: none; background: #28a745; color: white; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; border: none; width: 100%; }
        #contador { font-size: 18px; color: #555; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Procesando tu enlace...</h2>
        <div id="loader" class="loader"></div>
        <p id="contador">Cargando datos del servidor...</p>
        
        <a id="btnDestino" class="btn" target="_self">¡Ir al Enlace!</a>
    </div>

    <script>
        // CONFIGURACIÓN DE TU SUPABASE (Idéntica a index.html)
        const SUPABASE_URL = "https://vyrzkurggqvgylbznfwo.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5cnprdXJnZ3F2Z3lsYnpuZndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNTc4MzUsImV4cCI6MjA5NTkzMzgzNX0.iKqFDhmQWtHG17HdHIVz5HQDtXuyWmkmacJK_2Nb2pM";

        // Obtener el código único desde la URL (Ej: go.html?id=aB3x9Z)
        const urlParams = new URLSearchParams(window.location.search);
        const idCodigo = urlParams.get('id');

        async function buscarDestino() {
            if (!idCodigo) {
                document.getElementById('contador').innerText = "Enlace no válido.";
                document.getElementById('loader').style.display = 'none';
                return;
            }

            try {
                // Hacer la consulta a Supabase buscando el código correspondiente
                const response = await fetch(`${SUPABASE_URL}/rest/v1/enlaces?codigo=eq.${idCodigo}`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                const datos = await response.json();

                if (response.ok && datos.length > 0) {
                    // Si encuentra el enlace, inicia la cuenta regresiva pasándole la URL original
                    iniciarContador(datos[0].url_original);
                } else {
                    document.getElementById('contador').innerText = "El enlace no existe o ha expirado.";
                    document.getElementById('loader').style.display = 'none';
                }
            } catch (error) {
                document.getElementById('contador').innerText = "Error de conexión con el servidor.";
                document.getElementById('loader').style.display = 'none';
            }
        }

        function iniciarContador(urlDestino) {
            document.getElementById('loader').style.display = 'none';
            let tiempo = 10; // Segundos de espera para el usuario

            const cuentaAtras = setInterval(() => {
                tiempo--;
                document.getElementById('contador').innerText = `Espera ${tiempo} segundos para continuar...`;
                
                if (tiempo <= 0) {
                    clearInterval(cuentaAtras);
                    document.getElementById('contador').style.display = 'none';
                    const boton = document.getElementById('btnDestino');
                    
                    // CONFIGURACIÓN DE TU SMARTLINK DE MONETAG (Ya integrado)
                    boton.onclick = function() {
                        window.open("https://omg10.com/4/9616941", "_blank");
                    };
                    
                    // En la pestaña actual, el botón lo redirige al enlace original guardado
                    boton.href = urlDestino;
                    boton.style.display = 'inline-block';
                }
            }, 1000);
        }

        // Ejecutar la búsqueda automáticamente al cargar la página
        buscarDestino();
    </script>
</body>
</html>
